services:
  web:
    build:
      dockerfile_inline: |
        FROM imbios/bun-node:latest-current-slim
        COPY . .
        RUN bun i -f --verbose --no-verify --network-concurrency=96
        RUN bun run --cwd apps/1 build
    restart: unless-stopped
    network_mode: host
    depends_on:
      - db
      - redis
      - s3client
    command: >
      /bin/sh -c "
        bun run --cwd packages/db push &&
        bun run --cwd apps/1 start
      "

  db:
    image: postgres:alpine
    restart: unless-stopped
    command: >
      bash -c '
        (while true; do
          pg_isready -U postgres 2>&1
          sleep 5
        done) &
        docker-entrypoint.sh postgres
      '
    environment:
      POSTGRES_PASSWORD: $DB_PASSWORD
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 60s
      timeout: 5s
      retries: 5

  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    ulimits:
      memlock: -1
    ports:
      - 6379:6379
    command: dragonfly --cluster_mode=emulated --lock_on_hashtags
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | tee /proc/1/fd/1"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: $S3_ACCESS_KEY_ID
      MINIO_ROOT_PASSWORD: $S3_SECRET_ACCESS_KEY
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address ':9001'
    healthcheck:
      test: ["CMD-SHELL", "mc ready local | tee /proc/1/fd/1"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3client:
    image: minio/mc:latest
    network_mode: host
    depends_on:
      - s3
    entrypoint: >
      /bin/sh -c "
        until (mc alias set s3 $S3_ENDPOINT $S3_ACCESS_KEY_ID $S3_SECRET_ACCESS_KEY 2>/dev/null) do echo '...' && sleep 1; done;
        mc mb --ignore-existing s3/$S3_BUCKET;
        mc anonymous set public s3/$S3_BUCKET;
        exit 0;
      "
